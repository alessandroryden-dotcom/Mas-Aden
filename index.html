<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gemini Quest: The Last Guardian</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #game-container { position: relative; border: 4px solid #444; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { background: #2d5a27; cursor: crosshair; }
        .ui-layer { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .hp-bar-container { width: 200px; height: 20px; background: #444; border: 2px solid #fff; margin-bottom: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #ff3e3e; transition: width 0.2s; }
        .stats { font-weight: bold; text-shadow: 2px 2px #000; font-size: 18px; }
        #boss-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 400px; display: none; text-align: center; }
        #boss-hp-fill { width: 100%; height: 15px; background: #9b30ff; border: 1px solid #fff; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-layer">
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
            <div class="stats">LVL: <span id="lvl">1</span> | XP: <span id="xp">0</span></div>
        </div>

        <div id="boss-ui">
            <div style="font-weight: bold; margin-bottom: 5px;">ANCIENT DRAGON</div>
            <div id="boss-hp-fill"></div>
        </div>

        <div id="message"></div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1000;
canvas.height = 600;

// --- CONFIG & ASSETS ---
const keys = {};
let gameActive = true;

// Utility functions
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

// --- GAME OBJECTS ---
const player = {
    x: 100, y: 300, radius: 15,
    speed: 4, hp: 100, maxHp: 100,
    lvl: 1, xp: 0, 
    attackRange: 50, isAttacking: false,
    attackAngle: 0, dashCooldown: 0
};

const river = { x: 400, y: 0, width: 80, height: 600 };
const bridge = { x: 400, y: 250, width: 80, height: 100 };
const trees = [
    {x: 200, y: 100}, {x: 150, y: 450}, {x: 700, y: 80}, {x: 850, y: 500}, {x: 600, y: 350}
];

class Enemy {
    constructor(x, y, type = 'wolf') {
        this.x = x; this.y = y;
        this.radius = 12;
        this.hp = 30;
        this.speed = 2.5;
        this.type = type;
    }
    update() {
        const d = dist(this.x, this.y, player.x, player.y);
        if (d < 250) { // Chase logic
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
            
            if (d < 20) { // Attack player
                player.hp -= 0.5;
                checkGameOver();
            }
        }
    }
    draw() {
        ctx.fillStyle = '#777';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Boss {
    constructor() {
        this.x = 850; this.y = 300;
        this.radius = 60;
        this.hp = 500; this.maxHp = 500;
        this.active = false;
        this.fireballs = [];
        this.lastShot = 0;
    }
    update() {
        if (player.x > 600) this.active = true;
        if (!this.active) return;

        document.getElementById('boss-ui').style.display = 'block';
        
        // Shoot fireballs
        const now = Date.now();
        if (now - this.lastShot > 1500) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.fireballs.push({x: this.x, y: this.y, vx: Math.cos(angle)*5, vy: Math.sin(angle)*5});
            this.lastShot = now;
        }

        this.fireballs.forEach((f, i) => {
            f.x += f.vx; f.y += f.vy;
            if (dist(f.x, f.y, player.x, player.y) < 20) {
                player.hp -= 15;
                this.fireballs.splice(i, 1);
                checkGameOver();
            }
        });
    }
    draw() {
        if (!this.active) return;
        ctx.fillStyle = '#9b30ff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        // Fireballs
        ctx.fillStyle = '#ff8c00';
        this.fireballs.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, 8, 0, Math.PI*2); ctx.fill();
        });
    }
}

const enemies = [new Enemy(300, 100), new Enemy(550, 400), new Enemy(700, 200)];
const boss = new Boss();

// --- CONTROLS ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', attack);

function attack() {
    if (player.isAttacking) return;
    player.isAttacking = true;
    setTimeout(() => player.isAttacking = false, 300);

    // Hit Detection
    enemies.forEach((en, i) => {
        if (dist(player.x, player.y, en.x, en.y) < 60) {
            en.hp -= 15;
            if (en.hp <= 0) {
                enemies.splice(i, 1);
                player.xp += 20;
                checkLevelUp();
            }
        }
    });

    if (boss.active && dist(player.x, player.y, boss.x, boss.y) < 100) {
        boss.hp -= 20;
        document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';
        if (boss.hp <= 0) {
            boss.active = false;
            winGame();
        }
    }
}

function checkLevelUp() {
    if (player.xp >= player.lvl * 50) {
        player.lvl++;
        player.maxHp += 20;
        player.hp = player.maxHp;
        document.getElementById('lvl').innerText = player.lvl;
    }
    document.getElementById('xp').innerText = player.xp;
}

function checkGameOver() {
    document.getElementById('hp-fill').style.width = (player.hp / player.maxHp * 100) + '%';
    if (player.hp <= 0) {
        gameActive = false;
        const msg = document.getElementById('message');
        msg.style.display = 'block';
        msg.innerHTML = "YOU DIED<br><small>Tekan F5 untuk mengulang</small>";
        msg.style.color = "red";
    }
}

function winGame() {
    gameActive = false;
    const msg = document.getElementById('message');
    msg.style.display = 'block';
    msg.innerHTML = "VICTORY!<br>Naga Telah Dikalahkan";
    msg.style.color = "#00ff00";
}

// --- MAIN LOOP ---
function update() {
    if (!gameActive) return;

    let moveSpeed = player.speed;

    // Lingkungan: Efek Sungai (Lambat) & Jembatan
    const inRiver = player.x > river.x && player.x < river.x + river.width;
    const onBridge = player.y > bridge.y && player.y < bridge.y + bridge.height;
    if (inRiver && !onBridge) moveSpeed = 1.5;

    // Gerak Player
    if (keys['KeyW']) player.y -= moveSpeed;
    if (keys['KeyS']) player.y += moveSpeed;
    if (keys['KeyA']) player.x -= moveSpeed;
    if (keys['KeyD']) player.x += moveSpeed;

    // Dash (Shift)
    if (keys['ShiftLeft'] && player.dashCooldown <= 0) {
        player.x += (keys['KeyD'] ? 50 : keys['KeyA'] ? -50 : 0);
        player.y += (keys['KeyS'] ? 50 : keys['KeyW'] ? -50 : 0);
        player.dashCooldown = 60;
    }
    if (player.dashCooldown > 0) player.dashCooldown--;

    enemies.forEach(en => en.update());
    boss.update();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Sungai
    ctx.fillStyle = '#3498db';
    ctx.fillRect(river.x, river.y, river.width, river.height);

    // Draw Jembatan
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(bridge.x, bridge.y, bridge.width, bridge.height);

    // Draw Pohon
    trees.forEach(t => {
        ctx.fillStyle = '#0a3d00';
        ctx.beginPath(); ctx.arc(t.x, t.y, 30, 0, Math.PI*2); ctx.fill();
    });

    // Draw Musuh
    enemies.forEach(en => en.draw());

    // Draw Boss
    boss.draw();

    // Draw Player
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Draw Attack Swing
    if (player.isAttacking) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 45, 0, Math.PI * 2);
        ctx.stroke();
    }

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
